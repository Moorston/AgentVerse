[project]
name = "agentverse-extractor"
version = "0.1.0"
description = "AgentVerse LLM-based information extractor"
requires-python = ">=3.12"
dependencies = [
    "openai>=1.0",
    "anthropic>=0.30",
    "pydantic-ai>=0.2,<1.0",
    "agentverse-ontology",
    "agentverse-shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
sources = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/agentverse/extractor"]