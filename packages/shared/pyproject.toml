[project]
name = "agentverse-shared"
version = "0.1.0"
description = "AgentVerse shared utilities and base configuration"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "structlog>=24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentverse/shared"]

[tool.hatch.build]
sources = ["src"]