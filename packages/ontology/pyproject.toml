[project]
name = "agentverse-ontology"
version = "0.1.0"
description = "AgentVerse ontology definitions and schema"
requires-python = ">=3.12"
dependencies = [
    "agentverse-graph-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
sources = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/agentverse/ontology"]