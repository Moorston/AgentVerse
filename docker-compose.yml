version: "3.9"

x-shared-environment: &shared-env
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-agentverse_dev}
  POSTGRES_DSN: postgresql+asyncpg://agentverse:agentverse_dev@postgres:5432/agentverse
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  ENVIRONMENT: ${ENVIRONMENT:-development}

services:
  neo4j:
    image: neo4j:5-community
    container_name: agentverse-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-agentverse_dev}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg17
    container_name: agentverse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentverse_dev}
      POSTGRES_DB: agentverse
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentverse"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: agentverse-api
    ports:
      - "8000:8000"
    environment:
      <<: *shared-env
    depends_on:
      neo4j: { condition: service_healthy }
      postgres: { condition: service_healthy }
    command: ["uvicorn", "agentverse.api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: agentverse-worker
    environment:
      <<: *shared-env
    depends_on:
      neo4j: { condition: service_healthy }
      postgres: { condition: service_healthy }
    command: ["python", "-m", "agentverse.worker.main"]

  web:
    build:
      context: ./apps/web
      dockerfile: ../../docker/web.Dockerfile
    container_name: agentverse-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  postgres_data: